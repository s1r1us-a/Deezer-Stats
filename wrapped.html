<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="s1r1us-a Wrapped">
<meta name="theme-color" content="#0a0015">
<title>s1r1us-a — Wrapped ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="css/wrapped.css">
</head>
<body>

<!-- ═══ ENTRY ═══ -->
<section id="entry">
  <a href="index.html" class="entry-back">← Zurück</a>
  <div class="entry-inner">
    <div class="entry-eyebrow">s1r1us-a presents</div>
    <h1 class="entry-title">Wrapped<span class="entry-sparkle">✨</span></h1>
    <p class="entry-sub">Deine Musik-Story als Full-Screen-Reise. Wähle einen Zeitraum und los geht's.</p>

    <div class="entry-options">
      <button class="entry-card" id="opt-30d" type="button">
        <div class="entry-card-ico">⚡</div>
        <div class="entry-card-txt">
          <div class="entry-card-t">Die letzten 30 Tage</div>
          <div class="entry-card-s">What's hot right now</div>
        </div>
        <div class="entry-card-arr">→</div>
      </button>

      <button class="entry-card" id="opt-year" type="button">
        <div class="entry-card-ico">🗓️</div>
        <div class="entry-card-txt">
          <div class="entry-card-t">Jahres-Wrapped</div>
          <div class="entry-card-s">12 Monate deiner Musik</div>
        </div>
        <div class="entry-card-arr">→</div>
      </button>

      <div id="year-picker" style="display:none;padding:4px 2px 0;">
        <div class="year-grid" id="year-chips"></div>
      </div>
    </div>

    <div class="entry-foot">Tipp: Lang drücken pausiert · Tap rechts = weiter</div>
  </div>
</section>

<!-- ═══ LOADER ═══ -->
<section id="loader">
  <div class="loader-rings">
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
  </div>
  <div class="loader-status" id="loader-status">Lade dein Archiv…</div>
  <div class="loader-bar"><div class="loader-bar-fill" id="loader-bar"></div></div>
</section>

<!-- ═══ STORY ═══ -->
<section id="story">
  <div class="prog-wrap" id="prog-wrap"></div>
  <div class="topbar">
    <div class="topbar-chip" id="topbar-period">—</div>
    <div class="topbar-btns">
      <button class="tb-btn" id="btn-pause" title="Pausieren" aria-label="Pausieren">❚❚</button>
      <button class="tb-btn" id="btn-close" title="Schließen" aria-label="Schließen">✕</button>
    </div>
  </div>

  <div id="stage"></div>

  <div class="tz tz-l" id="tz-l"></div>
  <div class="tz tz-r" id="tz-r"></div>

  <div class="paused-tag" id="paused-tag">⏸ Pausiert</div>

  <div class="botbar">
    <div class="bb-hint"><span class="bb-dot"></span>Tap · Swipe · Hold</div>
  </div>

  <div class="flash" id="flash"></div>
</section>

<!-- hidden share card -->
<div id="share-card"></div>

<div class="toast" id="toast"></div>

<script src="js/wrapped.js"></script>
</body>
</html>
